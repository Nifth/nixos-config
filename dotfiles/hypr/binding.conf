###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bind = $mainMod, Q, exec, kitty
bind = $mainMod, C, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, nautilus    # file manager
bind = $mainMod, V, togglefloating,
bind = $mainMod, J, togglesplit, # dwindle
bind = $mainMod, P, exec, caelestia shell controlCenter open
bindr = $mainMod, Super_L, exec, caelestia shell drawers toggle launcher
bind = SUPER, N, exec, caelestia shell drawers toggle sidebar
bind = SUPER, L, exec, caelestia shell lock lock
bind = ALT_SHIFT, quotedbl, exec, caelestia shell picker open     # screenshot a window to clipboard
bind = ALT_SHIFT, apostrophe, exec, grim -g "$(slurp)" - | wl-copy && notify-send "Screenshot" "Zone copiée dans le presse-papier"
bind = , Print, exec, grim ~/Pictures/Screenshots_Screenshots$(date +%Y-%m-%d_%Hh%Mm%Ss).png && notify-send "Screenshot" "Écran complet sauvegardé" -i camera-photo
bind = $mainMod SHIFT, S, exec, notify-send "Enregistrement" "Sélectionnez la zone..." && wf-recorder -g "$(slurp)" -c libx264 -f ~/Videos/rec_$(date +%Y-%m-%d_%Hh%Mm%Ss).mp4
bind = $mainMod CTRL, S, exec, pkill -INT wf-recorder && notify-send "Enregistrement" "Vidéo sauvegardée"

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, ampersand, workspace, 1
bind = $mainMod, eacute, workspace, 2
bind = $mainMod, quotedbl, workspace, 3
bind = $mainMod, apostrophe, workspace, 4
bind = $mainMod, parenleft, workspace, 5
bind = $mainMod, minus, workspace, 6
bind = $mainMod, egrave, workspace, 7
bind = $mainMod, underscore, workspace, 8
bind = $mainMod, ccedilla, workspace, 9
bind = $mainMod, agrave, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, ampersand, movetoworkspace, 1
bind = $mainMod SHIFT, eacute, movetoworkspace, 2
bind = $mainMod SHIFT, quotedbl, movetoworkspace, 3
bind = $mainMod SHIFT, apostrophe, movetoworkspace, 4
bind = $mainMod SHIFT, parenleft, movetoworkspace, 5
bind = $mainMod SHIFT, minus, movetoworkspace, 6
bind = $mainMod SHIFT, egrave, movetoworkspace, 7
bind = $mainMod SHIFT, underscore, movetoworkspace, 8
bind = $mainMod SHIFT, ccedilla, movetoworkspace, 9
bind = $mainMod SHIFT, agrave, movetoworkspace, 10

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# pour swap le workspace comme un génie furieux
misc {
    # Si une application demande le focus (ex: Alt-Tab),
    # Hyprland switch automatiquement sur son workspace
    #focus_on_activate = true
}

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, caelestia shell brightness set "$(caelestia shell brightness get | awk '{print $1 + 0.1}')"
bindel = ,XF86MonBrightnessDown, exec, caelestia shell brightness set "$(caelestia shell brightness get | awk '{print $1 - 0.1}')"

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
